name: Build and deploy stevehocking.co.uk

on:
  push:
  workflow_dispatch:

# Permissions required by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping deployments; never cancel an in-progress deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true   # Runs `bundle install` and caches gems automatically

      - name: ⚙️ Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: 🔨 Build Jekyll site
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: 📦 Upload Pages artifact
        if: github.ref == 'refs/heads/main'   # ← gate the artifact upload
        uses: actions/upload-pages-artifact@v3
        # Uploads the default Jekyll output directory: _site/

      - name: 📦 Upload build artifact (non-main branches)
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site-${{ github.ref_name }}
          path: _site/
          retention-days: 7     

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'   # ← gate the deploy job
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4