<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Modern Gradient: Gradient geometric abstract -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="white"/>
  
  <polygon points="100,30 150,80 100,130 50,80" fill="url(#gradient)"/>
  <circle cx="100" cy="100" r="35" fill="none" stroke="url(#gradient)" stroke-width="3"/>
  
  <text x="100" y="165" font-family="sans-serif" font-size="18" font-weight="bold" fill="url(#gradient)" text-anchor="middle">CM</text>
</svg>