<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Neumorphic: Soft rounded forms -->
  <defs>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>
  
  <rect width="200" height="200" fill="#e0e5ec"/>
  
  <!-- Soft circles with depth -->
  <circle cx="100" cy="100" r="65" fill="#e0e5ec" style="filter: drop-shadow(5px 5px 10px #a3b1c6) drop-shadow(-5px -5px 10px #ffffff)"/>
  <circle cx="100" cy="100" r="50" fill="#e0e5ec" style="filter: drop-shadow(inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff)"/>
  
  <text x="100" y="115" font-family="sans-serif" font-size="40" font-weight="bold" fill="#a3b1c6" text-anchor="middle">CM</text>
</svg>