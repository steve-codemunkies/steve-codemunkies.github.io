<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Retro Modern: Memphis design style -->
  <rect width="200" height="200" fill="#ffbe0b"/>
  
  <!-- Memphis shapes -->
  <circle cx="70" cy="70" r="30" fill="#00d9ff" transform="rotate(-20 70 70)"/>
  <polygon points="150,50 190,90 150,130 110,90" fill="#ff006e" opacity="0.8"/>
  <rect x="40" y="120" width="50" height="50" fill="#00d9ff" rx="10" transform="rotate(15 65 145)"/>
  <circle cx="140" cy="160" r="20" fill="#ff006e" opacity="0.6"/>
  
  <!-- Retro text -->
  <g font-family="'Comic Sans MS', cursive" font-size="28" font-weight="bold" fill="#ff006e">
    <text x="100" y="100" text-anchor="middle">CM</text>
  </g>
</svg>