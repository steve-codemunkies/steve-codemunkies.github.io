<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Minimal Dark: Monochrome geometric design -->
  <defs>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="#1a1a1a"/>
  
  <!-- Geometric shapes -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#darkGrad)" stroke-width="3"/>
  <path d="M 70 100 L 130 100" stroke="url(#darkGrad)" stroke-width="2"/>
  <path d="M 100 70 L 100 130" stroke="url(#darkGrad)" stroke-width="2"/>
  <rect x="75" y="75" width="50" height="50" fill="none" stroke="url(#darkGrad)" stroke-width="2"/>
  
  <!-- Text -->
  <text x="100" y="165" font-family="monospace" font-size="14" fill="#00d9ff" text-anchor="middle" font-weight="bold">CM</text>
</svg>