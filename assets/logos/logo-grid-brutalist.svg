<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Grid Brutalist: Minimalist grid with brutalist monospace typography -->
  <rect width="200" height="200" fill="white" stroke="black" stroke-width="2"/>
  
  <!-- Grid pattern (lighter) -->
  <g stroke="#cccccc" stroke-width="1">
    <line x1="50" y1="0" x2="50" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="0" y1="50" x2="200" y2="50"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="150" x2="200" y2="150"/>
  </g>
  
  <!-- Accent square (brutalist style) -->
  <rect x="60" y="60" width="80" height="80" fill="none" stroke="#0066cc" stroke-width="2"/>
  
  <!-- Monospace text (brutalist style) -->
  <text x="100" y="135" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#0066cc" text-anchor="middle" letter-spacing="2">CM</text>
</svg>