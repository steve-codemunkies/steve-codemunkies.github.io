<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Cyberpunk: Futuristic neon geometric -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="#0a0e27"/>
  
  <!-- Neon lines -->
  <polygon points="100,30 160,80 120,140 80,140 40,80" fill="none" stroke="#00ff88" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="#ff00ff" stroke-width="2.5" filter="url(#glow)"/>
  
  <!-- Neon text -->
  <text x="100" y="165" font-family="monospace" font-size="20" font-weight="bold" fill="#ff00ff" text-anchor="middle" filter="url(#glow)">CM</text>
</svg>