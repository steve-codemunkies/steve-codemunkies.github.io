<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Glassmorphism: Clean outlined geometric -->
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
    </filter>
  </defs>
  
  <rect width="200" height="200" fill="#f0f0f0"/>
  
  <!-- Nested circles with glass effect -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#glassGrad)" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#glassGrad)" stroke-width="2" opacity="0.8"/>
  <circle cx="100" cy="100" r="30" fill="url(#glassGrad)" opacity="0.7"/>
  
  <text x="100" y="170" font-family="sans-serif" font-size="16" font-weight="500" fill="url(#glassGrad)" text-anchor="middle">CM</text>
</svg>